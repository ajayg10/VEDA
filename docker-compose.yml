
# Named volume for Memory service persistence.
# Lives at /var/lib/docker/volumes/veda_memory-data on the host.
# Survives container restarts, rebuilds, and even 'docker compose down'.
# Only destroyed by 'docker compose down -v'.
volumes:
  memory-data:
  prometheus_data:
  grafana_data:

# All services share this network.
# Containers reach each other by service name (e.g. http://planner:8001).
# No localhost, no hardcoded IPs.
networks:
  veda-net:
    driver: bridge

services:

  # ── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/static:/usr/share/nginx/html:ro
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - veda-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: veda-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    networks:
      - veda-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: veda-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=veda123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - veda-net
    restart: unless-stopped
    depends_on:
      - prometheus  

  # ── Orchestrator ─────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: .                              # project root = build context
      dockerfile: services/orchestrator/Dockerfile
    env_file: .env
    environment:
      - PLANNER_URL=http://planner:8001       # Docker DNS resolves 'planner'
      - MEMORY_URL=http://memory:8002
      - EXECUTOR_URL=http://executor:8003
      - VEDA_API_KEY=${VEDA_API_KEY}

    depends_on:
      planner:
        condition: service_healthy
      memory:
        condition: service_healthy
      executor:
        condition: service_healthy
    networks:
      - veda-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Planner ──────────────────────────────────────────────────────────────
  planner:
    build:
      context: .
      dockerfile: services/planner/Dockerfile
    env_file: .env
    networks:
      - veda-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Memory ───────────────────────────────────────────────────────────────
  memory:
    build:
      context: .
      dockerfile: services/memory/Dockerfile
    env_file: .env
    volumes:
      - memory-data:/data
    environment:
      - DB_PATH=/data/veda.db
      - FAISS_PATH=/data/veda.faiss
      - ID_MAP_PATH=/data/veda_id_map.json   # named volume mounted at /data inside container
    networks:
      - veda-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s    # embedding model initialization can take 60+ seconds

  # ── Executor ─────────────────────────────────────────────────────────────
  executor:
    build:
      context: .
      dockerfile: services/executor/Dockerfile
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - veda-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
