events {
    worker_connections 1024;
}

http {
    # The 'orchestrator' hostname resolves automatically inside the
    # Docker Compose network — no IP addresses needed.
    upstream orchestrator {
        server orchestrator:8000;
    }

    server {
        listen 80;

        # Forward all /api/* traffic to the orchestrator.
        # Strip the /api prefix before forwarding.
        location /api/ {
            proxy_pass         http://orchestrator/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Increase timeouts — LLM calls can take 10-30s
            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
        }

        # Health check passthrough (used by monitoring later)
        location /health {
            proxy_pass http://orchestrator/health;
        }

        # Nginx status (for Prometheus scraping in Phase 8)
        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
}