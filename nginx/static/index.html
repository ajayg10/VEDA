<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEDA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --bg2: #141414;
    --bg3: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #7c6dfa;
    --accent2: #5b4fcf;
    --success: #1d9e75;
    --danger: #e24b4a;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 56px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .logo {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
    margin-right: 6px;
  }

  .status-dot.offline { background: var(--text3); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text2);
  }

  #key-btn {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    color: var(--text2);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #key-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Auth overlay ── */
  #auth-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  .auth-card {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 36px;
    width: 380px;
    max-width: 90vw;
  }

  .auth-card h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .auth-card p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .auth-card input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    padding: 12px 14px;
    font-family: monospace;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }

  .auth-card input:focus { border-color: var(--accent); }

  .auth-card button {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .auth-card button:hover { background: var(--accent2); }

  #auth-error {
    font-size: 12px;
    color: var(--danger);
    margin-top: 8px;
    display: none;
  }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Messages ── */
  .msg { display: flex; gap: 12px; max-width: 820px; width: 100%; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
  }

  .avatar.veda {
    background: linear-gradient(135deg, var(--accent), #a08fff);
    color: #fff;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .avatar.user {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    color: var(--text2);
  }

  .bubble {
    max-width: calc(100% - 44px);
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant .bubble {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  /* ── Plan card ── */
  .plan-card {
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    margin-top: 10px;
    overflow: hidden;
  }

  .plan-header {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .step-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
    font-size: 13px;
  }
  .step-row:last-child { border-bottom: none; }

  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--bg);
    border: 0.5px solid var(--border2);
    color: var(--text2);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-num.success { background: var(--success); border-color: var(--success); color: #fff; }
  .step-num.failed { background: var(--danger); border-color: var(--danger); color: #fff; }

  .step-desc { color: var(--text); flex: 1; }
  .step-tool {
    font-size: 11px;
    color: var(--accent);
    background: rgba(124,109,250,0.12);
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .result-output {
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
    color: #7ee8a2;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
  }

  .result-error {
    margin-top: 8px;
    padding: 8px 10px;
    background: rgba(226,75,74,0.1);
    border-radius: 6px;
    font-size: 12px;
    color: var(--danger);
  }

  /* ── Typing indicator ── */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }
  .typing span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: var(--accent); }
  }

  /* ── Input bar ── */
  #input-bar {
    padding: 14px 20px;
    border-top: 0.5px solid var(--border);
    background: var(--bg2);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #prompt {
    flex: 1;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 22px;
    color: var(--text);
    font-size: 14px;
    padding: 11px 18px;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  #prompt:focus { border-color: var(--accent); }
  #prompt::placeholder { color: var(--text3); }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 0.5px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 17px;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.recording { background: var(--danger); border-color: var(--danger); color: #fff; animation: pulse 1s infinite; }
  .icon-btn.send { background: var(--accent); border-color: var(--accent); color: #fff; }
  .icon-btn.send:hover { background: var(--accent2); }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

  /* ── Empty state ── */
  #empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
    pointer-events: none;
    user-select: none;
  }

  #empty .big { font-size: 36px; font-weight: 700; color: var(--accent); opacity: 0.15; letter-spacing: 4px; }
  #empty p { font-size: 14px; }

  .suggestion-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 8px;
    pointer-events: all;
  }

  .chip {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .complexity-badge {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-left: 6px;
  }
  .complexity-badge.low { background: rgba(29,158,117,0.15); color: var(--success); }
  .complexity-badge.medium { background: rgba(186,117,23,0.15); color: #ef9f27; }
  .complexity-badge.high { background: rgba(226,75,74,0.15); color: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="logo">VEDA</div>
  <div class="header-right">
    <span><span class="status-dot offline" id="status-dot"></span><span id="status-text">not connected</span></span>
    <button id="key-btn" onclick="showAuth()">⚙ API Key</button>
  </div>
</header>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div class="auth-card">
    <h2>VEDA</h2>
    <p>Enter your API key to connect to your personal AI operating system.</p>
    <input type="password" id="api-key-input" placeholder="veda_xxxxxxxxxxxxxxxx" autocomplete="off" />
    <div id="auth-error">Invalid API key — please try again.</div>
    <button onclick="connect()">Connect</button>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div id="empty">
    <div class="big">VEDA</div>
    <p>Your personal AI operating system. What should I do?</p>
    <div class="suggestion-chips">
      <div class="chip" onclick="useChip(this)">List all Python files</div>
      <div class="chip" onclick="useChip(this)">Fetch Bitcoin price</div>
      <div class="chip" onclick="useChip(this)">Check system memory usage</div>
      <div class="chip" onclick="useChip(this)">Create a hello.txt file</div>
    </div>
  </div>
</div>

<!-- Input bar -->
<div id="input-bar">
  <textarea id="prompt" rows="1" placeholder="Tell VEDA what to do..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="icon-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">🎤</button>
  <button class="icon-btn send" onclick="send()" title="Send">➤</button>
</div>

<script>
const VEDA_URL = window.location.origin;
let apiKey = localStorage.getItem('veda_api_key') || '';
let isRecording = false;
let recognition = null;
let messageCount = 0;

function showAuth() {
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('api-key-input').value = apiKey;
}

function hideAuth() {
  document.getElementById('auth-overlay').style.display = 'none';
}

async function connect() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;

  try {
    const r = await fetch(`${VEDA_URL}/health`);
    if (!r.ok) throw new Error();
    apiKey = key;
    localStorage.setItem('veda_api_key', key);
    document.getElementById('auth-error').style.display = 'none';
    hideAuth();
    setStatus(true);
    if (messageCount === 0) addWelcome();
  } catch {
    document.getElementById('auth-error').style.display = 'block';
  }
}

function setStatus(online) {
  document.getElementById('status-dot').className = 'status-dot' + (online ? '' : ' offline');
  document.getElementById('status-text').textContent = online ? 'connected' : 'not connected';
}

function addWelcome() {
  addMessage('assistant', "Hello! I'm VEDA — your personal AI operating system. I can execute shell commands, fetch data from the web, run Python scripts, and more. What would you like me to do?");
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function useChip(el) {
  document.getElementById('prompt').value = el.textContent;
  send();
}

function addMessage(role, content, planData, resultData) {
  const empty = document.getElementById('empty');
  if (empty) empty.remove();
  messageCount++;

  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role === 'user' ? 'user' : 'veda'}`;
  avatar.textContent = role === 'user' ? '👤' : 'V';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (content) {
    const p = document.createElement('p');
    p.textContent = content;
    bubble.appendChild(p);
  }

  if (planData) {
    bubble.appendChild(buildPlanCard(planData, resultData));
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

function buildPlanCard(plan, result) {
  const card = document.createElement('div');
  card.className = 'plan-card';

  const complexity = plan.estimated_complexity || 'low';
  const header = document.createElement('div');
  header.className = 'plan-header';
  header.innerHTML = `
    ✦ plan
    <span class="complexity-badge ${complexity}">${complexity}</span>
    <span style="margin-left:auto;font-size:11px;color:var(--text3)">${plan.steps.length} step${plan.steps.length !== 1 ? 's' : ''}</span>
  `;
  card.appendChild(header);

  plan.steps.forEach(step => {
    const stepResult = result?.step_results?.find(r => r.step_id === step.step_id);
    const row = document.createElement('div');
    row.className = 'step-row';

    const numEl = document.createElement('div');
    numEl.className = 'step-num' + (stepResult ? (stepResult.status === 'success' ? ' success' : ' failed') : '');
    numEl.textContent = stepResult?.status === 'success' ? '✓' : stepResult?.status === 'failed' ? '✗' : step.step_id;

    const info = document.createElement('div');
    info.style.flex = '1';

    const descLine = document.createElement('div');
    descLine.style.display = 'flex';
    descLine.style.alignItems = 'center';
    descLine.style.gap = '8px';
    descLine.style.flexWrap = 'wrap';

    const desc = document.createElement('span');
    desc.className = 'step-desc';
    desc.textContent = step.description;

    const tool = document.createElement('span');
    tool.className = 'step-tool';
    tool.textContent = step.tool;

    descLine.appendChild(desc);
    descLine.appendChild(tool);
    info.appendChild(descLine);

    if (stepResult?.output && stepResult.status === 'success') {
      const out = document.createElement('div');
      out.className = 'result-output';
      out.textContent = stepResult.output;
      info.appendChild(out);
    }
    if (stepResult?.error && stepResult.status === 'failed') {
      const err = document.createElement('div');
      err.className = 'result-error';
      err.textContent = stepResult.error;
      info.appendChild(err);
    }

    row.appendChild(numEl);
    row.appendChild(info);
    card.appendChild(row);
  });

  return card;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.id = 'typing-indicator';

  const avatar = document.createElement('div');
  avatar.className = 'avatar veda';
  avatar.textContent = 'V';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function send() {
  const prompt = document.getElementById('prompt');
  const goal = prompt.value.trim();
  if (!goal || !apiKey) {
    if (!apiKey) showAuth();
    return;
  }

  prompt.value = '';
  prompt.style.height = 'auto';
  addMessage('user', goal);
  addTyping();

  try {
    const r = await fetch(`${VEDA_URL}/api/run`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': apiKey,
      },
      body: JSON.stringify({ goal, auto_execute: true }),
    });

    removeTyping();

    if (r.status === 401) {
      addMessage('assistant', 'Invalid API key. Please update your key in settings.');
      setStatus(false);
      return;
    }

    const data = await r.json();

    if (data.error) {
      addMessage('assistant', `Error: ${data.error}`);
      return;
    }

    const plan = data.plan;
    const result = data.result;
    const executed = data.executed;

    let summary = '';
    if (executed && result) {
      const ok = result.status === 'success';
      const ms = Math.round(result.total_duration_ms || 0);
      summary = ok
        ? `Done in ${ms}ms. Here's what I did:`
        : `Ran into an issue after ${ms}ms:`;
    } else {
      summary = `Here's my plan for: "${plan?.goal}"`;
    }

    addMessage('assistant', summary, plan, result);

  } catch (e) {
    removeTyping();
    addMessage('assistant', `Connection error: ${e.message}`);
    setStatus(false);
  }
}

// ── Voice input ──
function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Voice input not supported in this browser. Try Chrome.');
    return;
  }

  if (isRecording) {
    recognition?.stop();
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-IN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '⏹';
  };

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('prompt').value = transcript;
    autoResize(document.getElementById('prompt'));
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('mic-btn').textContent = '🎤';
    recognition = null;
  };

  recognition.onerror = (e) => {
    console.error('Speech error', e);
    recognition.stop();
  };

  recognition.start();
}

// ── Init ──
document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});

if (apiKey) {
  fetch(`${VEDA_URL}/health`)
    .then(r => { if (r.ok) { setStatus(true); hideAuth(); addWelcome(); } })
    .catch(() => setStatus(false));
} else {
  document.getElementById('auth-overlay').style.display = 'flex';
}
</script>
</body>
</html>
